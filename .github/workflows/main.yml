name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
    - name: Download Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Project Dependencies
      run: |
        npm cache clean --force
        npm install

    - name: Build React (Vite)
      run: npm run build

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Inject Native Android Motor
      run: |
        npx cap add android || true
        npx cap sync android

    - name: Inject server_client_id into strings.xml
      run: |
        STRINGS_FILE="android/app/src/main/res/values/strings.xml"
        if grep -q "server_client_id" "$STRINGS_FILE"; then
          echo "server_client_id already present, skipping."
        else
          sed -i 's|</resources>|    <string name="server_client_id">1099016850057-v232nk1h4nvnhtu01cf0j5kfan3t0884.apps.googleusercontent.com</string>\n</resources>|' "$STRINGS_FILE"
          echo "server_client_id injected."
        fi

    - name: PASO TEMPORAL — Generar keystore definitivo UNA SOLA VEZ
      run: |
        KEYSTORE_DIR="$HOME/.android"
        KEYSTORE="$KEYSTORE_DIR/debug.keystore"
        mkdir -p "$KEYSTORE_DIR"

        echo "Generando el keystore definitivo (esta es la ULTIMA vez que cambia)..."
        keytool -genkeypair \
          -v \
          -keystore "$KEYSTORE" \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=Android Debug,O=Android,C=US"

        echo ""
        echo "========================================"
        echo "  SHA-1 DEFINITIVO PARA GOOGLE CLOUD"
        echo "========================================"
        keytool -list -v \
          -keystore "$KEYSTORE" \
          -alias androiddebugkey \
          -storepass android \
          -keypass android \
          | grep "SHA1:"
        echo "========================================"
        echo ""
        echo "========================================"
        echo "  COPIA TODO EL TEXTO DE ABAJO COMPLETO"
        echo "  (entre BEGIN y END) PARA EL SECRET"
        echo "  DEBUG_KEYSTORE_BASE64"
        echo "========================================"
        echo "-----BEGIN KEYSTORE BASE64-----"
        base64 -w 0 "$KEYSTORE"
        echo ""
        echo "-----END KEYSTORE BASE64-----"
        echo "========================================"

    - name: Grant Gradle Execution Permissions
      run: chmod +x android/gradlew

    - name: Compile Application (Debug APK)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Generated APK
      uses: actions/upload-artifact@v4
      with:
        name: proficha-app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

