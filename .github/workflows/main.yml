name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
    - name: Download Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Project Dependencies
      run: |
        npm cache clean --force
        npm install

    - name: Build React (Vite)
      run: npm run build

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Inject Native Android Motor
      run: |
        npx cap add android || true
        npx cap sync android

    - name: Inject server_client_id into strings.xml
      run: |
        STRINGS_FILE="android/app/src/main/res/values/strings.xml"
        if grep -q "server_client_id" "$STRINGS_FILE"; then
          echo "server_client_id already present, skipping."
        else
          sed -i 's|</resources>|    <string name="server_client_id">1099016850057-v232nk1h4nvnhtu01cf0j5kfan3t0884.apps.googleusercontent.com</string>\n</resources>|' "$STRINGS_FILE"
          echo "server_client_id injected."
        fi

    - name: Restore persistent debug keystore (or create it on first run)
      run: |
        KEYSTORE_DIR="$HOME/.android"
        KEYSTORE="$KEYSTORE_DIR/debug.keystore"
        mkdir -p "$KEYSTORE_DIR"

        if [ -n "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
          echo "Restaurando keystore fijo guardado en secrets..."
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE"
        else
          echo "ADVERTENCIA: no hay secret DEBUG_KEYSTORE_BASE64 configurado."
          echo "Generando un keystore nuevo. Esto cambiará el SHA-1 otra vez."
          keytool -genkeypair \
            -v \
            -keystore "$KEYSTORE" \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
        fi

        echo ""
        echo "========================================"
        echo "  SHA-1 ACTUAL DEL KEYSTORE EN USO"
        echo "========================================"
        keytool -list -v \
          -keystore "$KEYSTORE" \
          -alias androiddebugkey \
          -storepass android \
          -keypass android \
          | grep "SHA1:"
        echo "========================================"

    - name: Grant Gradle Execution Permissions
      run: chmod +x android/gradlew

    - name: Compile Application (Debug APK)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Generated APK
      uses: actions/upload-artifact@v4
      with:
        name: proficha-app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

