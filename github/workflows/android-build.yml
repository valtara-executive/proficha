name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Descargar código fuente
      uses: actions/checkout@v4

    - name: ⚙️ Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        # Eliminamos la instrucción de caché que estaba causando el error fatal

    - name: 🛠️ Instalar dependencias del proyecto
      run: npm install

    - name: 🏗️ Construir React (Vite)
      run: npm run build

    - name: 🤖 Inyectar motor nativo Android (Capacitor)
      run: |
        npx cap add android
        npx cap sync android

    - name: ☕ Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 🔨 Dar permisos de ejecución a Gradle
      run: chmod +x android/gradlew

    - name: 🚀 Compilar la aplicación (Debug APK)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: 📤 Subir archivo APK generado
      uses: actions/upload-artifact@v4
      with:
        name: proficha-app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
